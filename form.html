<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MeowTel Booking Form</title>
  <style>
    /* 1. ISOLATED ENVIRONMENT STYLING */
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #ffffff; /* Matches the inner card container background */
      color: #3E2723;            /* Corporate dark brown text */
      padding: 20px;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    form {
      width: 100%;
      max-width: 460px; /* Perfectly centers and contains fields inside the layout column */
    }

    /* 2. SPACING & LAYOUT */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #3E2723;
    }

    /* 3. INPUT FIELD STYLING */
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #E8C4A0; /* Soft warm peach border */
      border-radius: 8px;
      background-color: #FFFDF9;  /* Minimalist off-white/cream field tint */
      box-sizing: border-box;
      font-family: inherit;
      font-size: 0.95rem;
      color: #3E2723;
      transition: border-color 0.2s, background-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #C46A3B;     /* Terracotta theme color on click */
      background-color: #ffffff;
    }

    textarea {
      resize: vertical;
    }

    /* 4. PREMIUM CTA BUTTON */
    button {
      background-color: #C46A3B; /* Theme terracotta */
      color: #FFFDF9;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 5px;
    }

    button:hover {
      background-color: #A8502A; /* Darker terracotta accent */
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <form action="mailto:meowpethotel@gmail.com" method="POST" enctype="text/plain">
    
    <div class="form-group">
      <label for="name">Owner's Name</label>
      <input type="text" id="name" name="Owner Name" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="Email Address" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label for="subject">Service Required</label>
      <select id="subject" name="Requested Service" required>
        <option value="">-- Select Option --</option>
        <option value="Cat Hotel Booking">Cat Hotel Boarding</option>
        <option value="Grooming & Spa Treatment">Grooming & Spa Treatment</option>
        <option value="General Inquiries">General Inquiries</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message & Special Notes</label>
      <textarea id="message" name="Special Requirements" rows="4" placeholder="Tell us about your cat or special care needs..." required></textarea>
    </div>

    <button type="submit">Send Message</button>
  </form>

</body>
</html>
